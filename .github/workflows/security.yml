name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run security scan weekly
    - cron: "0 0 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Run Trivy file/config scan
        continue-on-error: ${{ github.event_name != 'schedule' }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "sarif"
          output: "trivy-fs-results.sarif"

      - name: Run Trivy secret scan
        continue-on-error: ${{ github.event_name != 'schedule' }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "secret"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "sarif"
          output: "trivy-secret-results.sarif"

      - name: Run Trivy dependency scan
        continue-on-error: ${{ github.event_name != 'schedule' }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          format: "sarif"
          output: "trivy-config-results.sarif"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@a60c4df7a135c7317c1e9ddf9b5a9b07a910dda9
        if: always()
        continue-on-error: true
        with:
          sarif_file: |
            trivy-fs-results.sarif
            trivy-secret-results.sarif
            trivy-config-results.sarif

      - name: Run pip-audit (dependency vulnerabilities)
        continue-on-error: ${{ github.event_name != 'schedule' }}
        run: |
          pip install pip-audit
          pip-audit --desc

      - name: OWASP Dependency-Check
        continue-on-error: ${{ github.event_name != 'schedule' }}
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
        with:
          project: "secopsai"
          path: "."
          format: "SARIF"
          args: >
            --enablePackageAudit

      - name: Upload OWASP Dependency-Check results
        uses: github/codeql-action/upload-sarif@a60c4df7a135c7317c1e9ddf9b5a9b07a910dda9
        if: always() && hashFiles('dependency-check-report.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: "dependency-check-report.sarif"

      - name: Create security badge
        run: |
          # This creates a simple status file that can be displayed in README
          # Badge format: "Security: ✓ Scanned on [date]"
          echo "Last security scan: $(date)" > SECURITY_BADGE.txt

  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Check for vulnerable dependencies
        run: |
          pip install safety bandit

          # Check for vulnerabilities in Python packages
          safety check -r requirements.txt --output json > safety-report.json

          # Static security analysis
          bandit -r . -x ./.git,./.venv,./__pycache__,./data,./tests -f json -o bandit-report.json

      - name: Upload reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: security-reports
          path: |
            safety-report.json
            bandit-report.json
          retention-days: 30

  license-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Check licenses with REUSE
        uses: fsfe/reuse-action@4d31d76f16747cf196a58f1ae62f215e7cc739a9
        continue-on-error: true

      - name: License compliance report
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses
          pip-licenses --format=csv --output-file=licenses.csv
          pip-licenses --format=plain
