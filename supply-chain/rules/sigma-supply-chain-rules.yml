# Sigma Rules for Supply Chain Attack Detection
# Place in: /etc/sigma/rules/ or your SIEM's sigma directory
# Requires: Sigma CLI or sigmac for conversion

title: npm Postinstall Network Activity - Supply Chain Indicator
id: secopsai-0001
status: experimental
description: |
  Detects when npm/node processes spawn network utilities (curl, wget, powershell) 
  during package installation. This is a high-confidence indicator of supply chain 
  attacks like the Axios incident (March 2026).
  
  References:
  - https://www.picussecurity.com/resource/blog/axios-npm-supply-chain-attack
  - CVE-2026-Axios-SupplyChain
logsource:
  category: process_creation
  product: linux, macos, windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '/node'
      - '/nodejs'
      - '\node.exe'
      - '/npm'
      - '/npx'
      - '\\npm.cmd'
      - '\\npx.cmd'
  selection_child_network:
    Image|endswith:
      - '/curl'
      - '/wget'
      - '/python'
      - '/python3'
      - '/powershell'
      - '/pwsh'
      - '\\powershell.exe'
      - '\\pwsh.exe'
      - '/bash'
      - '/sh'
      - '/zsh'
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - '.com'
      - '.net'
      - '.org'
  selection_suspicious_args:
    CommandLine|contains:
      - 'Invoke-WebRequest'
      - 'iwr'
      - 'curl -O'
      - 'wget -O'
      - 'base64'
      - 'eval'
      - 'exec'
  condition: selection_parent and (selection_child_network or selection_suspicious_args)
falsepositives:
  - Legitimate build scripts that download assets
  - CI/CD pipelines with intentional network calls
level: critical
tags:
  - attack.supply-chain
  - attack.t1195.001
  - attack.execution
  - detection.threat-hunting
