title: Suspicious npm Package Installation Pattern
description: |
  Detects installation of packages with suspicious characteristics:
  - New maintainer accounts
  - Postinstall scripts in recently published packages
  - Typosquatting candidates
id: secopsai-0004
status: experimental
logsource:
  category: process_creation
  product: linux, macos, windows
detection:
  selection_npm_install:
    CommandLine|contains:
      - 'npm install'
      - 'npm i '
      - 'npm add '
      - 'yarn add'
      - 'pnpm add'
  selection_suspicious_packages:
    CommandLine|contains:
      - 'plain-crypto-js'
      - 'sync-axios'
      - 'axios-http-client'
      - 'node-axios'
  condition: selection_npm_install and selection_suspicious_packages
falsepositives:
  - Legitimate installations (though these specific packages are known malicious)
level: critical
tags:
  - attack.supply-chain
  - attack.t1195.001
---
title: LiteLLM Proxy Server Anomaly
description: |
  Detects anomalous behavior from LiteLLM proxy processes including
  credential access, unusual API calls, or configuration changes.
id: secopsai-0005
status: experimental
logsource:
  category: process_creation
  product: linux, macos
detection:
  selection_litellm_process:
    Image|contains:
      - 'litellm'
      - 'proxy_server'
    CommandLine|contains:
      - 'litellm'
  selection_credential_access:
    CommandLine|contains:
      - '.env'
      - 'config.yaml'
      - 'credentials'
      - 'api_key'
      - 'AWS_'
      - 'AZURE_'
      - 'OPENAI_'
  selection_suspicious_behavior:
    - CommandLine|contains:
        - 'base64'
        - 'curl'
        - 'wget'
        - 'nc '
        - 'netcat'
        - '/dev/tcp'
  condition: selection_litellm_process and (selection_credential_access or selection_suspicious_behavior)
falsepositives:
  - Normal LiteLLM configuration
level: high
tags:
  - attack.credential-access
  - attack.t1552
  - attack.collection
---
title: Editor Spawning Shell with Network Connection
description: |
  Detects when Vim/Emacs spawn shell processes that establish network connections.
  High-confidence indicator of editor-based exploitation.
id: secopsai-0006
status: experimental
logsource:
  category: network_connection
  product: linux, macos, windows
detection:
  selection_editor_process:
    Image|endswith:
      - '/vim'
      - '/nvim'
      - '/emacs'
      - '/gvim'
      - '\\vim.exe'
      - '\\emacs.exe'
  selection_shell_child:
    ParentImage|endswith:
      - '/vim'
      - '/nvim'
      - '/emacs'
      - '/gvim'
      - '\\vim.exe'
      - '\\emacs.exe'
    Image|endswith:
      - '/bash'
      - '/sh'
      - '/zsh'
      - '/python'
      - '/python3'
      - '/curl'
      - '/wget'
      - '\\cmd.exe'
      - '\\powershell.exe'
  selection_network:
    DestinationPort|contains:
      - 80
      - 443
      - 8000
      - 8080
      - 9000
  condition: selection_editor_process or (selection_shell_child and selection_network)
falsepositives:
  - Legitimate :! commands in Vim
  - Emacs shell mode usage
level: high
tags:
  - attack.execution
  - attack.t1059
  - attack.command-and-control
---
title: npm Registry Account Anomaly - Email Change Followed by Publish
description: |
  Detects suspicious npm registry events where an account email is changed
  followed by package publication within 24 hours. Pattern from Axios attack.
id: secopsai-0007
status: experimental
logsource:
  category: application
  product: npm
detection:
  selection_email_change:
    EventType: 'account.email_changed'
  selection_publish:
    EventType: 'package.publish'
  timeframe: 24h
  condition: selection_email_change followed by selection_publish
falsepositives:
  - Legitimate account maintenance
level: high
tags:
  - attack.supply-chain
  - attack.t1195.001
  - attack.initial-access
---
title: Suspicious File Drops in System Directories
description: |
  Detects creation of suspicious files in system directories that match
  known supply chain RAT payloads (Axios, Shai-Hulud patterns).
id: secopsai-0008
status: experimental
logsource:
  category: file_event
  product: linux, macos, windows
detection:
  macos_suspicious:
    TargetFilename|contains:
      - '/Library/Caches/com.apple.act.'
      - '/Library/LaunchAgents/com.apple.'
  linux_suspicious:
    TargetFilename|endswith:
      - '/tmp/ld.py'
      - '/tmp/.X11-unix/.'
      - '/var/tmp/systemd-'
  windows_suspicious:
    TargetFilename|contains:
      - '\\wt.exe'
      - '\\ProgramData\\Microsoft\\Windows\\SystemData\\'
      - '\\AppData\\Local\\Temp\\sys'
  selection_content:
    - Content|contains:
        - 'import socket'
        - 'import requests'
        - 'subprocess.Popen'
        - 'base64.b64decode'
        - 'exec('
        - 'eval('
  condition: (macos_suspicious or linux_suspicious or windows_suspicious) and selection_content
falsepositives:
  - Legitimate system files
level: critical
tags:
  - attack.persistence
  - attack.t1543
  - attack.supply-chain
