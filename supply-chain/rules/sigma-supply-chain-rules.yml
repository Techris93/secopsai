title: Suspicious Editor Plugin Modification
description: |
  Detects when Vim or Emacs plugins are modified with suspicious content
  containing shell execution functions. Detects CVE-2025-27423, CVE-2025-1244.
id: secopsai-0002
status: experimental
logsource:
  category: file_event
  product: linux, macos, windows
detection:
  selection_paths:
    TargetFilename|contains:
      - '/.vim/plugin/'
      - '/.vim/syntax/'
      - '/.vim/after/'
      - '/.vimrc'
      - '/.config/nvim/'
      - '/.emacs.d/'
      - '/.emacs'
      - '/usr/share/vim/'
      - '/usr/share/emacs/'
      - '\\vimfiles\\'
      - '_vimrc'
  selection_suspicious_content:
    - Content|contains:
        - 'system('
        - 'exec('
        - 'eval('
        - '__import__'
        - 'subprocess.call'
        - 'os.system'
        - 'shell_exec'
        - ':read !'
    - Content|re:
        - '.*[`;|&].*http.*'
        - '.*curl.*\|.*sh.*'
        - '.*wget.*-O.*-.*'
  condition: selection_paths and selection_suspicious_content
falsepositives:
  - Legitimate plugin development
  - Configuration management tools
level: high
tags:
  - attack.execution
  - attack.t1059
  - attack.persistence
---
title: Python .pth File Execution - Supply Chain Persistence
description: |
  Detects creation or modification of Python .pth files which execute on 
  every Python interpreter startup. Used in LiteLLM attack (CVE-2026-LiteLLM).
id: secopsai-0003
status: experimental
logsource:
  category: file_event
  product: linux, macos, windows
detection:
  selection_extension:
    TargetFilename|endswith: '.pth'
  selection_paths:
    TargetFilename|contains:
      - '/site-packages/'
      - '/dist-packages/'
      - '\\site-packages\\'
      - '\\Lib\\site-packages\\'
  selection_suspicious_content:
    - Content|contains:
        - 'import'
        - 'exec'
        - 'eval'
        - '__import__'
        - 'base64'
        - 'decode'
  filter_legitimate:
    - Content|startswith: '#'
    - Content|contains: 'pth file generated'
  condition: selection_extension and selection_paths and selection_suspicious_content and not filter_legitimate
falsepositives:
  - Legitimate .pth files for path configuration
level: critical
tags:
  - attack.persistence
  - attack.t1546.018
  - attack.supply-chain
