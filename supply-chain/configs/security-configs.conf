# SecOpsAI Security Configuration Files
# Copy these to your project or system configuration

# ============================================
# 1. npm Security Configuration (.npmrc)
# ============================================
# Save as: ~/.npmrc or project/.npmrc

# Require provenance for all packages
provenance=true

# Disable scripts by default (manually enable for trusted packages)
ignore-scripts=true

# Use lockfile strictly
package-lock=true

# Audit on install
audit=true

# Fund messages are noise
fund=false

# Require 2FA for publishing (organization setting)
# Run: npm access 2fa-required

# Use granular tokens instead of classic
# npm token create --cidr=203.0.113.0/24 --expires=30d

# ============================================
# 2. Vim Security Configuration (.vimrc)
# ============================================
# Save as: ~/.vimrc

" Disable modelines (CVE-2019-12735, CVE-2025-53905)
set nomodeline

" Disable tar plugin auto-execution (CVE-2025-27423)
let g:loaded_tar = 1
let g:loaded_tarPlugin = 1

" Disable zip plugin auto-execution (CVE-2025-53906)
let g:loaded_zip = 1
let g:loaded_zipPlugin = 1

" Restrict shell access
set secure

" Disable ex mode
map Q <Nop>

" Disable write backup for untrusted files
set nobackup
set nowritebackup

" Show full path in status line
set statusline=%F%m%r%h%w\ [FORMAT=%{&ff}]

" Alert on file change outside vim
set autoread
au CursorHold * checktime

" ============================================
" Secure Plugin Management
" ============================================

" Only load plugins from trusted sources
" Use vim-plug or pathogen with signature verification

" Example with vim-plug security:
" let g:plug_url_format = 'git@github.com:%s.git'

" ============================================
" 3. Neovim Security Configuration (init.vim)
" ============================================
" Save as: ~/.config/nvim/init.vim

" Inherit all Vim security settings
set nomodeline
set secure

" Disable built-in plugins with security history
let g:loaded_tarPlugin = 1
let g:loaded_zipPlugin = 1
let g:loaded_gzip = 1

" Treesitter security
lua << EOF
require'nvim-treesitter.configs'.setup {
  -- Only use official parsers
  parser_install_dir = vim.fn.stdpath("data") .. "/site",
  highlight = {
    enable = true,
    -- Disable for large files
    disable = function(lang, buf)
      local max_filesize = 100 * 1024 -- 100 KB
      local ok, stats = pcall(vim.loop.fs_stat, vim.api.nvim_buf_get_name(buf))
      if ok and stats and stats.size > max_filesize then
        return true
      end
    end,
  },
}
EOF

" ============================================
" 4. Emacs Security Configuration (.emacs or init.el)
" ============================================
" Save as: ~/.emacs or ~/.emacs.d/init.el

;; Disable man URI handler (CVE-2025-1244)
(delete 'man browse-url-handlers)

;; Disable woman (other man page viewer)
(global-set-key (kbd "\C-h") 'help-command)
(global-set-key (kbd "\C-xw") nil)

;; Secure file variables
(setq enable-local-variables nil)
(setq enable-local-eval nil)

;; Disable automatic execution of local variables
(setq file-local-variables-alist nil)

;; Safe themes only
(setq custom-safe-themes t)

;; Disable risky functions
(put 'eval-expression 'disabled t)
(put 'shell-command 'disabled nil)

;; Org-mode security
(setq org-confirm-babel-evaluate t)
(setq org-export-use-babel nil)

;; Require confirmation for shell commands
(setq shell-command-query t)

;; ============================================
;; Secure Package Management
;; ============================================

;; Use only signed packages
(setq package-check-signature 'allow-unsigned)

;; Verify package signatures
(add-hook 'package-menu-mode-hook
          (lambda ()
            (setq package-check-signature 'allow-unsigned)))

;; ============================================
" 5. CI/CD Security Configuration (.github/workflows/security.yml)
" ============================================
" Save as: .github/workflows/security.yml

name: Security Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        # Verify commit signatures
        persist-credentials: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    # Verify lockfile integrity
    - name: Verify lockfile
      run: |
        if [ -f package-lock.json ]; then
          npm ci --package-lock-only
        fi
    
    # Install dependencies without scripts
    - name: Install dependencies (no scripts)
      run: npm ci --ignore-scripts
    
    # Run npm audit
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    # SBOM generation
    - name: Generate SBOM
      run: |
        npm install -g @cyclonedx/cyclonedx-npm
        cyclonedx-npm --output-file sbom.json
    
    # Validate SBOM against policy
    - name: Validate SBOM
      run: |
        python3 secopsai-toolkit/agents/sbom_validator.py \
          --sbom sbom.json \
          --policy strict \
          --fail-on-critical
    
    # Check for known malicious packages
    - name: Check dependencies
      run: |
        python3 secopsai-toolkit/agents/npm_registry_monitor.py \
          --check-lockfile package-lock.json \
          --fail-on-critical
    
    # Secret scanning
    - name: Secret Detection
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

  # Supply chain specific checks
  supply-chain-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for postinstall scripts
      run: |
        echo "Checking for postinstall scripts..."
        npm ls --json | jq '.. | objects | select(.scripts.postinstall) | .name'
        if [ $? -eq 0 ]; then
          echo "⚠️ Packages with postinstall scripts found"
          exit 1
        fi
      continue-on-error: true
    
    - name: Verify package provenance
      run: |
        for pkg in $(npm ls --json | jq -r '.dependencies | keys[]'); do
          npm view $pkg provenance 2>/dev/null || echo "⚠️ $pkg lacks provenance"
        done
      continue-on-error: true

# ============================================
" 6. Docker Security (Dockerfile.security)
" ============================================

# Multi-stage build with security scanning
FROM node:20-alpine AS builder

# Run as non-root
USER node

# Copy only necessary files
COPY --chown=node:node package*.json ./

# Install dependencies without scripts
RUN npm ci --ignore-scripts

# Production stage
FROM node:20-alpine AS production

# Security updates
RUN apk update && apk upgrade

# Create non-root user
RUN addgroup -g 1001 -S nodejs && \
    adduser -S nodejs -u 1001

WORKDIR /app

# Copy from builder
COPY --from=builder --chown=nodejs:nodejs /home/node/node_modules ./node_modules
COPY --chown=nodejs:nodejs . .

# Disable all npm scripts
RUN npm config set ignore-scripts true

# Read-only filesystem
USER nodejs

# Health check
HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
  CMD node healthcheck.js || exit 1

EXPOSE 3000

CMD ["node", "server.js"]

# ============================================
" 7. Kubernetes Security Policy
" ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: secopsai-security-policy
data:
  # Block known malicious domains
  blocked-domains: |
    sfrclak.com
    models.litellm.cloud
    checkmarx.zone
  
  # Allowed registries only
  allowed-registries: |
    docker.io
    gcr.io
    *.amazonaws.com

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53

---
apiVersion: v1
kind: LimitRange
metadata:
  name: secopsai-limits
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: secopsai-quota
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"

---
# Pod Security Policy (deprecated, use OPA/Gatekeeper or PSA)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: secopsai-restricted
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'

# ============================================
" 8. Systemd Service for Continuous Monitoring
" ============================================
# Save as: /etc/systemd/system/secopsai-monitor.service

[Unit]
Description=SecOpsAI Supply Chain Monitor
After=network.target

[Service]
Type=simple
ExecStart=/usr/bin/python3 /opt/secopsai/agents/runtime_monitor.py --monitor --log /var/log/secopsai/monitor.log
Restart=always
RestartSec=10
User=root
StandardOutput=journal
StandardError=journal

# Security hardening
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=true
ReadWritePaths=/var/log/secopsai
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectControlGroups=true

[Install]
WantedBy=multi-user.target

# ============================================
" 9. Logrotate Configuration
" ============================================
# Save as: /etc/logrotate.d/secopsai

/var/log/secopsai/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0600 root root
    sharedscripts
    postrotate
        systemctl reload secopsai-monitor > /dev/null 2>&1 || true
    endscript
}

# ============================================
" 10. Fail2ban Configuration for C2 Blocking
" ============================================
# Save as: /etc/fail2ban/jail.local

[secopsai-c2]
enabled = true
filter = secopsai-c2
logpath = /var/log/secopsai/monitor.log
maxretry = 1
findtime = 60
bantime = 86400
action = iptables-multiport[name=secopsai-c2, port="any", protocol=all]

# Filter: /etc/fail2ban/filter.d/secopsai-c2.conf
# [Definition]
# failregex = Connection to known C2: <HOST>
# ignoreregex =

# ============================================
" Quick Start Checklist
" ============================================
# Run these commands to secure your environment:

# 1. Install npm security config
cp configs/.npmrc ~/.npmrc

# 2. Secure Vim
cp configs/.vimrc ~/.vimrc

# 3. Secure Emacs
cp configs/.emacs ~/.emacs

# 4. Install monitoring agents
sudo mkdir -p /opt/secopsai
sudo cp -r agents/* /opt/secopsai/
sudo cp -r rules/* /opt/secopsai/

# 5. Setup systemd service
sudo cp configs/secopsai-monitor.service /etc/systemd/system/
sudo systemctl daemon-reload
sudo systemctl enable secopsai-monitor
sudo systemctl start secopsai-monitor

# 6. Setup log directory
sudo mkdir -p /var/log/secopsai
sudo mkdir -p /var/secopsai/quarantine
sudo mkdir -p /var/secopsai/dumps

# 7. Run initial scan
python3 /opt/secopsai/npm_registry_monitor.py --check-lockfile package-lock.json
python3 /opt/secopsai/runtime_monitor.py --check-existing --check-files

# 8. Add to CI/CD
cp configs/security.yml .github/workflows/
